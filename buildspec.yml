version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies...
      - pip install -r app/requirements.txt

  pre_build:
    commands:
      - echo Logging in to Docker Hub (optional)

  build:
    commands:
      - echo Building Docker image...
      - docker build -t mi-app .

  post_build:
    commands:
      - echo Build completed

artifacts:
  files:
    - '**/*'
